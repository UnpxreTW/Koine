# REUSE 設定：批次涵蓋無法掛 inline SPDX header 的 manifest / 設定 / 鎖定 / 文件檔。
# 已掛 header 的 .swift 原始碼不在此列（核心 Sources/Koine 走 FSL-1.1-ALv2、CLI 殼 Sources/CLI 走 Apache-2.0）；
# 授權全文見 LICENSES/。
version = 1

[[annotations]]
path = [
	".config/mise.toml",
	".gitignore",
	".package.resolved",
	"AUTHORS",
	"Project.swift",
	"README.md",
	"Sources/Extension/Resources/manifest.json",
	"docs/CODEOWNERS",
	"docs/SECURITY.md",
	"jsconfig.json",
	"package.json",
	"package-lock.json",
	"Tests/Fixtures/**",
	"Tests/**/__Golden__/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Unpxre (GitHub: UnpxreTW)"
SPDX-License-Identifier = "Apache-2.0"
