name: Build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Pin Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'
      - name: Install Tuist via mise
        uses: jdx/mise-action@v4
      - name: tuist generate
        run: tuist generate --no-open
      - name: xcodebuild build
        run: xcodebuild build -workspace Koine.xcworkspace -scheme Koine-Workspace -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO -skipPackagePluginValidation -skipMacroValidation
