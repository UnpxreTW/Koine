name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Pin Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'
      - name: Install Tuist + Node via mise
        uses: jdx/mise-action@v4
      - name: tuist generate
        run: tuist generate --no-open
      - name: xcodebuild test (KoineDOMTests)
        run: xcodebuild test -workspace Koine.xcworkspace -scheme KoineDOMTests -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO -skipPackagePluginValidation -skipMacroValidation
      - name: npm ci
        run: npm ci
      - name: npm test (DOM fixtures)
        run: npm test
